services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__PostgreConnection=${CONNECTION}
    depends_on:
       db:
          condition: service_healthy
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: ${PASSWORD}
      POSTGRES_DB: ${NAME}
      POSTGRES_USER: ${USER}
    volumes: 
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$USER -d $$NAME"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
    postgres_data:

